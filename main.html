<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker-main page</title>

    <!-- tailwind -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <!-- icons- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font style -->
    <style>
        * {
            font-family: 'Geist', sans-serif;
        }
    </style>

    
</head>

<body>
    <nav class="bg-white border-b border-gray-200 py-4 px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4">
    
        <div class="flex items-center gap-3">
            <img src="assets/main-page-github-logo.png" alt="github logo" class>
            <h1 class="text-xl font-bold text-gray-700">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input 
                    type="text" 
                    placeholder="Search issues..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition-all"
                >
            </div>

            <button class="bg-[#4A00FF] text-white px-5 py-2 rounded-lg font-bold text-sm flex items-center gap-2 hover:opacity-85 transition-all cursor-pointer whitespace-nowrap">
                <i class="fa-solid fa-plus"></i> New Issue
            </button>
        </div>
    </nav>

    <main class="w-[75%] mx-auto">
        <section class="mt-20 mb-8 bg-white border border-gray-100 rounded-xl p-3 shadow-sm">
            <div class="flex items-center gap-4">
                
                <button id="filterAll" class="px-6 py-1.5 bg-[#4A00FF] text-white text-sm font-semibold rounded-lg transition-all cursor-pointer hover:opacity-85">
                    All
                </button>

                <button id="filterOpen" class="px-6 py-1.5 bg-white text-gray-500 border border-gray-100 text-sm font-semibold rounded-lg hover:bg-[#4A00FF] hover:text-white hover:font-semibold transition-all cursor-pointer">
                    Open
                </button>

                <button id="filterClosed" class="px-6 py-1.5 bg-white text-gray-500 border border-gray-100 text-sm font-semibold rounded-lg hover:bg-[#4A00FF] hover:text-white hover:font-semibold transition-all cursor-pointer">
                    Closed
                </button>

            </div>
        </section>

        <section class="bg-white border border-gray-200 rounded-xl pb-3 shadow-sm">
            <div class="flex justify-between items-center bg-white px-6 border-b border-gray-200 p-3 shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="bg-gray-300 rounded-full flex items-center justify-center w-12 h-12">
                        <img src="assets/Aperture.png" alt="" class="w-10 h-10">
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800"><span id="totalCount">0</span> Issues</h2>
                        <p class="text-sm text-gray-500 font-medium">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex justify-between items-center gap-4 mb-1">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                        <span class="text-xs font-bold text-gray-600">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                        <span class="text-xs font-bold text-gray-600">Closed</span>
                    </div>
                </div>
            </div>

            <div id="issuesWrapper" class="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pb-10 px-5">
            </div>

        </section>

        <section>
            
        </section>


        
    </main>

    <script src="scripts/main.js"></script>
    
</body>
</html>
